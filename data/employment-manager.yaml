company:
- name: Order Tiger
  logo: images/logos/ordertiger.png
  url: https://www.ordertiger.com/
  location: Remote/London
  role: "Fractional CTO Consultant"
  date: "Apr '24 - Current"
  description: Providing executive-level technology leadership for a growing food and hospitality SaaS platform, driving strategic technology decisions and scaling the product for market expansion

  projects:
    - name: Ongoing Fractional CTO Engagement
      description: Acting as fractional CTO, owning the technology vision, architecture decisions, and product roadmap while aligning technical capabilities with business growth objectives.

      detail:
        - contents: <strong>Technology Vision & Strategy</strong> - Defining and executing the long-term technology roadmap, evaluating build vs buy decisions, and ensuring technical architecture supports business scalability and market expansion goals.
        - contents: <strong>Product & Engineering Leadership</strong> - Overseeing all aspects of product development across backend, frontend, mobile, and infrastructure, ensuring cohesive delivery and quality standards across all channels.
        - contents: <strong>Vendor & Partnership Management</strong> - Evaluating and integrating third-party services including payment gateways (RyftPay), delivery platforms, and communication channels, negotiating contracts and ensuring fit-for-purpose solutions.
        - contents: <strong>Cloud Infrastructure & Cost Optimization</strong> - Managing <strong>AWS</strong> infrastructure strategy, implementing cost-effective scaling solutions, and ensuring platform reliability and security for a growing customer base.
        - contents: <strong>Stakeholder & Client Engagement</strong> - Representing the technology function in client pitches and partnership discussions, providing technical credibility and translating complex solutions into business value propositions.
        - contents: <strong>Technical Due Diligence & Quality Assurance</strong> - Conducting architecture reviews, establishing coding standards, and implementing quality processes to reduce technical debt and improve platform stability.

- name: Sainsburys Tech
  logo: images/logos/sainsburys.png
  url: https://www.sainsburys.jobs/life-at-sainsburys
  location: Remote (Security Cleared)
  role: "Engineering Manager Consultant (via Daemon Solutions)"
  date: "Feb '25 - Current"
  description: Leading engineering teams delivering digital transformation across Sainsbury's 1,400+ store estate, managing multi-disciplinary teams and driving strategic technology initiatives that directly impact millions of customer interactions daily

  projects:
    - name: In-store Digital Content Platform
      description: Engineering management of a high-visibility retail transformation program, leading cross-functional teams of 12+ engineers while delivering enterprise-scale digital solutions under aggressive timelines and ensuring seamless integration across the UK's third-largest supermarket chain

      detail:
        - contents: <strong>Engineering Team Leadership & Development</strong> - Managing and developing a team of 12+ software engineers across full-stack, platform, and DevOps disciplines, conducting regular 1:1s, performance reviews, and career progression planning while maintaining high team engagement and productivity during rapid delivery cycles.
        - contents: <strong>Strategic Program Management</strong> - Owning the technical delivery roadmap for digital content platform rollout across 1,400+ stores, coordinating with senior retail stakeholders, managing cross-team dependencies, and ensuring alignment with Sainsbury's omnichannel strategy and customer experience objectives.
        - contents: <strong>Budget & Resource Optimization</strong> - Managing engineering budget allocation, contractor procurement, and resource planning decisions, optimizing team composition and cloud infrastructure costs while ensuring successful delivery within retail industry competitive timelines and cost constraints.
        - contents: <strong>Modern Technology Stack Leadership</strong> - Directed strategic adoption of <strong>Java 21+</strong> and modern development practices, leading architectural decisions, technology evaluations, and implementation standards that improved development velocity by 40% while ensuring enterprise-grade scalability and performance.
        - contents: <strong>DevOps & Platform Strategy</strong> - Orchestrated the implementation of sophisticated <strong>GitHub Actions</strong> CI/CD pipelines and <strong>Docker</strong> containerization strategies, establishing deployment automation and infrastructure-as-code practices that reduced deployment times by 70% and eliminated production incidents.
        - contents: <strong>Cloud Infrastructure Management</strong> - Led the design and cost optimization of <strong>AWS</strong> infrastructure architecture, managing multi-environment deployments, capacity planning, and disaster recovery strategies while ensuring 99.99% availability for customer-facing retail systems across peak shopping periods.
        - contents: <strong>Security & Compliance Leadership</strong> - Implemented enterprise security standards including <strong>HashiCorp Vault</strong> integration for secrets management, ensuring PCI-DSS compliance, data protection regulations adherence, and establishing security-first development practices across all engineering teams.
        - contents: <strong>Operational Excellence & Monitoring</strong> - Established comprehensive observability frameworks using <strong>New Relic</strong> and <strong>AWS CloudWatch</strong>, implementing SLI/SLO targets, automated alerting, and incident management processes that improved system reliability and reduced MTTR by 60% during critical retail periods.
        - contents: <strong>Stakeholder Management & Communication</strong> - Regularly presented technical progress and strategic recommendations to C-level executives, retail operations directors, and technology leadership, translating complex technical deliverables into business impact metrics and maintaining transparency across transformation initiatives.
        - contents: <strong>Engineering Culture & Knowledge Transfer</strong> - Built a collaborative engineering culture through structured mentoring programs, technical workshops, and cross-team pairing sessions, resulting in improved code quality, enhanced team capabilities, and successful knowledge sharing across retail technology domains.

- name: HMRC - CDIO
  logo: images/logos/hmrc.png
  url: https://www.civil-service-careers.gov.uk/hmrc-digital-cdio/
  location: Remote (Security Cleared)
  role: "Engineering Manager Consultant (Contract via EE)"
  date: "Feb '23 - Nov '24"
  description: UK Government HMRC going through the largest transformation in Europe

  projects:
    - name: CDAP Upgrade
      description: A managing a cross-functional team owning the re-platforming of services and tools as well as managing the cloudera migration.

      detail:
        - contents: <strong>Microservices Health Auditing & Improvement</strong> - Overseeing product microservices audits to ensure system health, addressing technical debt, and implementing performance, scalability, and maintainability improvements.
        - contents: <strong>CI/CD Pipeline Migration</strong> -  Leading the migration of CI/CD pipelines from Jenkins to GitLab, enhancing automation, improving developer productivity, and accelerating release cycles.
        - contents: <strong>Platform Standardization & Security Compliance</strong> - Aligning product teams with new platform standards, migrating sensitive data to Vault, and strengthening security and compliance to reduce operational risk.
        - contents: <strong>Performance Optimization & Cluster Migration</strong> - Collaborating with engineering teams to implement performance testing strategies and ensure smooth application transitions with minimized latency and optimized resource use.
        - contents: <strong>Dual Running Strategy & Cluster Transition</strong> -  Leading the dual-running strategy for seamless cluster migration with minimal downtime, focused on planning, testing, and risk management.
        - contents: <strong>Team Enablement & Tooling Adoption</strong> - Leading workshops and pair programming sessions to foster continuous learning, innovation, and adoption of new tools and technologies within the team.
        - contents: <strong>Cultivating Operability & Reliability</strong> - Advocating for long-term system stability, reliability, and fault tolerance, ensuring systems are optimized for monitoring, troubleshooting, and scaling.
        - contents: <strong>Monitoring & Incident Management</strong> - Enhancing operational visibility with AWS CloudWatch, proactively addressing issues, and streamlining incident management for quick response and minimal downtime.
        - contents: <strong>Cross-Functional Collaboration & Mentorship</strong> - Promoting collaboration across teams, aligning development, operations, and security, and mentoring engineers to foster ownership and accountability.
        - contents: <strong>Strategic Roadmap Development - Contributing</strong> to the strategic direction of platform and infrastructure, ensuring engineering initiatives align with long-term business goals, focusing on scalability, security, and performance.

- name: John Lewis
  logo: images/logos/johnlewis.png
  url: https://www.johnlewispartnership.co.uk/about.html
  location: London
  role: "Lead Engineering Consultant (Contract via EE)"
  date: "Oct '18 - Feb '23"
  description: A British household retailer, where re-platforming, training partners and innovating in the online space has been opening new avenues online as well as maintaining strong customer relationships has been at the core technology values.

  projects:
    - name: Recommendations (July '22 - Feb '23)
      description: Led a cross-functional team in delivering personalized product recommendations by driving architectural improvements and enhancing the performance and reliability of customer-facing services.
  
    - name: Digital Merchandising (December '19 - July '22)
      description: Managed the migration of legacy systems and led a team to modernize the digital merchandising platform, resulting in a more scalable, flexible architecture supporting real-time operations across multiple microservices.
  
    - name: CRM Acceleration (October '18 - December '19)
      description: Led a high-performing team responsible for migrating legacy CRM systems to microservices, ensuring high availability and performance while overseeing cross-functional collaboration and technical execution.

      detail:
        - contents: <strong>Leading Service Health Audits & Technical Improvements</strong> - Oversaw a comprehensive audit of service health, guiding the team through improving <strong>Kotlin (JVM)</strong> code quality, refining development processes, and strengthening test coverage for increased production stability.
        - contents: <strong>Driving Data Infrastructure Development</strong> - Led the design and implementation of scalable data pipelines in collaboration with data scientists, leveraging <strong>Google Dataflow</strong>, <strong>Cloud Functions</strong>, and <strong>Pub/Sub</strong> to enable real-time customer data processing.
        - contents: <strong>Strategic Data Model In-Housing & Migration</strong> - Defined and executed the migration strategy for bringing data models in-house, ensuring smooth transition without impacting sales conversion, while optimizing internal data architecture.
        - contents: <strong>Overseeing Machine Learning Model Deployment</strong> - Led the integration and deployment of machine learning models using <strong>Google Vertex AI</strong>, ensuring high availability and seamless operation in a production environment.
        - contents: <strong>Fostering a Culture of Experimentation & Innovation</strong> - Encouraged a culture of experimentation and innovation, empowering engineers to explore new technologies and methods, which resulted in more efficient and impactful product features.
        - contents: <strong>Cross-Functional Enablement through Workshops & Pairing</strong> - Drove team development by organizing regular workshops and pair programming sessions, promoting knowledge sharing and ensuring alignment on technical direction across teams.
        - contents: <strong>Data Analysis Leadership for Business Insights</strong> - Directed the analysis and reporting of key business data, utilizing <strong>Google Big Query</strong>, <strong>Google Datastore</strong>, and <strong>Google Datastudio</strong> to provide actionable insights to stakeholders and inform strategic decisions.
        - contents: <strong>Building Operational Tools for Efficiency</strong> - Led the development of back-office tools that streamlined operations, reduced manual tasks, and enhanced productivity for internal teams.
        - contents: <strong>Automating Processes with Cloud Functions</strong> - Championed the automation of workflows, removing manual intervention through the use of <strong>cloud functions</strong>, resulting in greater efficiency and reduced error rates.
        - contents: <strong>Promoting Operational Reliability & Monitoring</strong> - Instilled a focus on operational reliability by building and maintaining observability tools and performance monitoring dashboards, ensuring high availability of critical services.
        - contents: <strong>Enhancing Tooling & Development Practices</strong> - Spearheaded the creation of internal tools that optimized development processes, making the team more agile and reducing time-to-market for key features.
        - contents: <strong>Implementing Microservices Architecture for Scalability</strong> - Guided the implementation of a <strong>microservices architecture</strong>, enabling teams to deploy independently and scale with business demands while minimizing downtime.
        - contents: <strong>Cross-Disciplinary Collaboration for Testing & Performance</strong> - Led cross-functional collaboration with central testing and performance teams, ensuring all services adhered to stringent quality standards and performance requirements.

